name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/ios/**"
      - ".github/workflows/ios-ipa.yml"

permissions:
  contents: write

env:
  IOS_PROJECT_DIR: apps/ios/Orange Cloud
  IOS_PROJECT: Orange Cloud.xcodeproj
  IOS_SCHEME: Orange Cloud
  IPA_NAME: OrangeCloud-TrollStore.ipa

jobs:
  build-ipa:
    name: Build TrollStore IPA
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List project schemes
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        run: xcodebuild -list -project "$IOS_PROJECT"

      - name: Resolve package dependencies
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$IOS_PROJECT" \
            -scheme "$IOS_SCHEME"

      - name: Install TrollStore signing tools
        run: brew install ldid

      - name: Prepare Xcode 16 app icon
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        run: |
          APP_ICON_SET="Orange Cloud/Assets.xcassets/Orange Cloud.appiconset"

          mkdir -p "$APP_ICON_SET"
          cp "Orange Cloud/Orange Cloud.icon/Assets/Foreground.png" "$APP_ICON_SET/Icon-iOS-1024x1024@1x.png"
          cat > "$APP_ICON_SET/Contents.json" <<'JSON'
          {
            "images" : [
              {
                "filename" : "Icon-iOS-1024x1024@1x.png",
                "idiom" : "universal",
                "platform" : "ios",
                "size" : "1024x1024"
              }
            ],
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          JSON

      - name: Archive app without code signing
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        run: |
          ARCHIVE_PATH="$RUNNER_TEMP/OrangeCloud.xcarchive"

          xcodebuild archive \
            -project "$IOS_PROJECT" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          ARCHIVE_PATH="$RUNNER_TEMP/OrangeCloud.xcarchive"
          EXPORT_DIR="$RUNNER_TEMP/ipa"
          PAYLOAD_DIR="$RUNNER_TEMP/Payload"

          APP_PATH="$(find "$ARCHIVE_PATH/Products/Applications" -maxdepth 1 -type d -name "*.app" -print -quit)"

          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in $ARCHIVE_PATH/Products/Applications"
            exit 1
          fi

          rm -rf "$PAYLOAD_DIR" "$EXPORT_DIR"
          mkdir -p "$PAYLOAD_DIR" "$EXPORT_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/"

          APP_BUNDLE="$PAYLOAD_DIR/$(basename "$APP_PATH")"
          rm -rf "$APP_BUNDLE/Watch" "$APP_BUNDLE/PlugIns"
          rm -rf "$APP_BUNDLE/_CodeSignature" "$APP_BUNDLE/Metadata.appintents"
          find "$APP_BUNDLE" -name "*.appintents" -type d -prune -exec rm -rf {} +
          find "$APP_BUNDLE" -name "*.icon" -type d -prune -exec rm -rf {} +

          sign_macho() {
            local binary_path="$1"

            ldid -S "$binary_path"
          }

          if [ -d "$APP_BUNDLE/Frameworks" ]; then
            find "$APP_BUNDLE/Frameworks" \( -name "*.framework" -o -name "*.dylib" \) -print0 |
              while IFS= read -r -d '' framework_path; do
                if [ -d "$framework_path" ]; then
                  framework_name="$(basename "$framework_path" .framework)"
                  sign_macho "$framework_path/$framework_name"
                else
                  sign_macho "$framework_path"
                fi
              done
          fi

          APP_EXECUTABLE="$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_BUNDLE/Info.plist")"
          sign_macho "$APP_BUNDLE/$APP_EXECUTABLE"

          REPORT_PATH="$EXPORT_DIR/OrangeCloud-TrollStore-package.txt"
          {
            echo "IPA: $IPA_NAME"
            echo "Bundle: $(basename "$APP_BUNDLE")"
            echo "Bundle ID: $(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_BUNDLE/Info.plist")"
            echo "Minimum OS: $(/usr/libexec/PlistBuddy -c "Print :MinimumOSVersion" "$APP_BUNDLE/Info.plist")"
            echo
            echo "Package tree:"
            find "$PAYLOAD_DIR" -maxdepth 4 -print | sort
            echo
            echo "Codesign:"
            /usr/bin/codesign -dv --verbose=4 "$APP_BUNDLE" 2>&1 || true
            echo
            echo "ldid:"
            ldid -e "$APP_BUNDLE/$APP_EXECUTABLE" 2>&1 || true
            echo
            echo "Entitlements:"
            if /usr/bin/codesign -d --entitlements :- "$APP_BUNDLE" 2>&1; then
              :
            else
              echo "No entitlements embedded in the app signature."
            fi
          } > "$REPORT_PATH"

          cd "$(dirname "$PAYLOAD_DIR")"
          /usr/bin/zip -qry "$EXPORT_DIR/$IPA_NAME" "$(basename "$PAYLOAD_DIR")"
          ls -lh "$EXPORT_DIR/$IPA_NAME"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrangeCloud-TrollStore-IPA
          path: ${{ runner.temp }}/ipa/${{ env.IPA_NAME }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish IPA release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="ios-ipa-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          IPA_PATH="$RUNNER_TEMP/ipa/$IPA_NAME"

          gh release create "$TAG" "$IPA_PATH" \
            "$RUNNER_TEMP/ipa/OrangeCloud-TrollStore-package.txt" \
            --repo "$GITHUB_REPOSITORY" \
            --title "iOS IPA $GITHUB_RUN_NUMBER.$GITHUB_RUN_ATTEMPT" \
            --notes "Minimal TrollStore IPA built from $GITHUB_SHA. This build removes Watch, Widget extensions, and custom entitlements." \
            --latest
