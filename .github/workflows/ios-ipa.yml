name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/ios/**"
      - ".github/workflows/ios-ipa.yml"

permissions:
  contents: write

env:
  IOS_PROJECT_DIR: apps/ios/Orange Cloud
  IOS_PROJECT: Orange Cloud.xcodeproj
  IOS_SCHEME: Orange Cloud
  MINIMAL_IPA_NAME: OrangeCloud-TrollStore-minimal.ipa
  FULL_IPA_NAME: OrangeCloud-TrollStore-full.ipa

jobs:
  build-ipa:
    name: Build TrollStore IPA
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List project schemes
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        run: xcodebuild -list -project "$IOS_PROJECT"

      - name: Resolve package dependencies
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$IOS_PROJECT" \
            -scheme "$IOS_SCHEME"

      - name: Install TrollStore signing tools
        run: brew install ldid

      - name: Prepare Xcode 16 app icon
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        run: |
          APP_ICON_SET="Orange Cloud/Assets.xcassets/Orange Cloud.appiconset"

          mkdir -p "$APP_ICON_SET"
          cp "Orange Cloud/Orange Cloud.icon/Assets/Foreground.png" "$APP_ICON_SET/Icon-iOS-1024x1024@1x.png"
          cat > "$APP_ICON_SET/Contents.json" <<'JSON'
          {
            "images" : [
              {
                "filename" : "Icon-iOS-1024x1024@1x.png",
                "idiom" : "universal",
                "platform" : "ios",
                "size" : "1024x1024"
              }
            ],
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          JSON

      - name: Archive app without code signing
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        run: |
          ARCHIVE_PATH="$RUNNER_TEMP/OrangeCloud.xcarchive"

          xcodebuild archive \
            -project "$IOS_PROJECT" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=NO \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS=OPENSOURCE_UNLOCKED

      - name: Package IPA
        run: |
          ARCHIVE_PATH="$RUNNER_TEMP/OrangeCloud.xcarchive"
          EXPORT_DIR="$RUNNER_TEMP/ipa"
          WORK_DIR="$RUNNER_TEMP/package-work"
          PLIST_BUDDY="/usr/libexec/PlistBuddy"

          APP_PATH="$(find "$ARCHIVE_PATH/Products/Applications" -maxdepth 1 -type d -name "*.app" -print -quit)"

          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in $ARCHIVE_PATH/Products/Applications"
            exit 1
          fi

          rm -rf "$WORK_DIR" "$EXPORT_DIR"
          mkdir -p "$WORK_DIR" "$EXPORT_DIR"

          app_executable_path() {
            local bundle_path="$1"
            local executable_name

            executable_name="$("$PLIST_BUDDY" -c "Print :CFBundleExecutable" "$bundle_path/Info.plist")"
            echo "$bundle_path/$executable_name"
          }

          sign_macho() {
            local binary_path="$1"

            if [ ! -f "$binary_path" ]; then
              echo "::error::Mach-O binary not found: $binary_path"
              exit 1
            fi

            ldid -S "$binary_path"
          }

          strip_xcode_metadata() {
            local bundle_path="$1"

            find "$bundle_path" -name "_CodeSignature" -type d -prune -exec rm -rf {} +
            find "$bundle_path" -name "Metadata.appintents" -type d -prune -exec rm -rf {} +
            find "$bundle_path" -name "*.appintents" -type d -prune -exec rm -rf {} +
            find "$bundle_path" -name "*.icon" -type d -prune -exec rm -rf {} +
          }

          sign_embedded_binaries() {
            local bundle_path="$1"

            find "$bundle_path" -name "*.framework" -type d -print0 |
              while IFS= read -r -d '' framework_path; do
                framework_name="$(basename "$framework_path" .framework)"

                if [ -f "$framework_path/$framework_name" ]; then
                  sign_macho "$framework_path/$framework_name"
                fi
              done

            find "$bundle_path" -name "*.dylib" -type f -print0 |
              while IFS= read -r -d '' dylib_path; do
                sign_macho "$dylib_path"
              done
          }

          sign_bundle_executable() {
            local bundle_path="$1"

            sign_macho "$(app_executable_path "$bundle_path")"
          }

          sign_app_bundle_only() {
            local bundle_path="$1"

            if [ -d "$bundle_path/Frameworks" ]; then
              sign_embedded_binaries "$bundle_path/Frameworks"
            fi

            sign_bundle_executable "$bundle_path"
          }

          write_package_report() {
            local ipa_name="$1"
            local payload_dir="$2"
            local app_bundle="$3"
            local report_path="$4"

            {
              echo "IPA: $ipa_name"
              echo "Bundle: $(basename "$app_bundle")"
              echo "Bundle ID: $("$PLIST_BUDDY" -c "Print :CFBundleIdentifier" "$app_bundle/Info.plist")"
              echo "Minimum OS: $("$PLIST_BUDDY" -c "Print :MinimumOSVersion" "$app_bundle/Info.plist")"
              echo
              echo "Package tree:"
              find "$payload_dir" -maxdepth 5 -print | sort
              echo
              echo "Codesign:"
              /usr/bin/codesign -dv --verbose=4 "$app_bundle" 2>&1 || true
              echo
              echo "ldid entitlements:"
              ldid -e "$(app_executable_path "$app_bundle")" 2>&1 || true
            } > "$report_path"
          }

          zip_payload() {
            local payload_dir="$1"
            local ipa_name="$2"

            (
              cd "$(dirname "$payload_dir")"
              /usr/bin/zip -qry "$EXPORT_DIR/$ipa_name" "$(basename "$payload_dir")"
            )
            ls -lh "$EXPORT_DIR/$ipa_name"
          }

          MINIMAL_PAYLOAD_DIR="$WORK_DIR/minimal/Payload"
          mkdir -p "$MINIMAL_PAYLOAD_DIR"
          cp -R "$APP_PATH" "$MINIMAL_PAYLOAD_DIR/"

          MINIMAL_APP_BUNDLE="$MINIMAL_PAYLOAD_DIR/$(basename "$APP_PATH")"
          strip_xcode_metadata "$MINIMAL_APP_BUNDLE"
          rm -rf "$MINIMAL_APP_BUNDLE/Watch" "$MINIMAL_APP_BUNDLE/PlugIns"
          sign_embedded_binaries "$MINIMAL_APP_BUNDLE"
          sign_macho "$(app_executable_path "$MINIMAL_APP_BUNDLE")"
          write_package_report \
            "$MINIMAL_IPA_NAME" \
            "$MINIMAL_PAYLOAD_DIR" \
            "$MINIMAL_APP_BUNDLE" \
            "$EXPORT_DIR/OrangeCloud-TrollStore-minimal-package.txt"
          zip_payload "$MINIMAL_PAYLOAD_DIR" "$MINIMAL_IPA_NAME"

          FULL_PAYLOAD_DIR="$WORK_DIR/full/Payload"
          mkdir -p "$FULL_PAYLOAD_DIR"
          cp -R "$APP_PATH" "$FULL_PAYLOAD_DIR/"

          FULL_APP_BUNDLE="$FULL_PAYLOAD_DIR/$(basename "$APP_PATH")"
          strip_xcode_metadata "$FULL_APP_BUNDLE"
          sign_app_bundle_only "$FULL_APP_BUNDLE"
          write_package_report \
            "$FULL_IPA_NAME" \
            "$FULL_PAYLOAD_DIR" \
            "$FULL_APP_BUNDLE" \
            "$EXPORT_DIR/OrangeCloud-TrollStore-full-package.txt"
          zip_payload "$FULL_PAYLOAD_DIR" "$FULL_IPA_NAME"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrangeCloud-TrollStore-IPA
          path: ${{ runner.temp }}/ipa/*
          if-no-files-found: error
          retention-days: 14

      - name: Publish IPA release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="ios-ipa-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"

          gh release create "$TAG" \
            "$RUNNER_TEMP/ipa/$MINIMAL_IPA_NAME" \
            "$RUNNER_TEMP/ipa/$FULL_IPA_NAME" \
            "$RUNNER_TEMP/ipa/OrangeCloud-TrollStore-minimal-package.txt" \
            "$RUNNER_TEMP/ipa/OrangeCloud-TrollStore-full-package.txt" \
            --repo "$GITHUB_REPOSITORY" \
            --title "iOS IPA $GITHUB_RUN_NUMBER.$GITHUB_RUN_ATTEMPT" \
            --notes "Pro-unlocked TrollStore IPAs built from $GITHUB_SHA. Download OrangeCloud-TrollStore-full.ipa for restored Widget/Watch bundle content. Use OrangeCloud-TrollStore-minimal.ipa as the known-good install fallback." \
            --latest
